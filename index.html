<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mind & Markets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      color: #34d399;
    }

    .card {
      background: #111827;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
    }

    button {
      background: #34d399;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Mind & Markets</h1>
    <p>Du business expliqué simplement</p>

    <div class="card">
      <h2>C’est quoi une action ?</h2>
      <p>Une action = une part d’entreprise</p>
    </div>

    <div class="card">
      <h2>Pourquoi les prix augmentent ?</h2>
      <p>C’est l’inflation → hausse générale des prix</p>
    </div>

    <div class="card">
      <h2>Quiz</h2>
      <p>Une action = ?</p>
      <button onclick="alert('Bonne réponse 🎉')">Une part d’entreprise</button>
    </div>

  </div>

</body>
</html>
